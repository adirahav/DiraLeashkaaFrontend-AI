openapi: 3.0.3
info:
  title: User API
  version: 1.0.0
  description: API for managing users, splash data and home data.

servers:
  - url: /api/user

paths:
  /:
    get:
      summary: List users
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
        '400':
          description: Couldn't get users

    put:
      summary: Update logged-in user
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                yearOfBirth:
                  type: integer
                termsOfUseAccept:
                  type: boolean
                equity:
                  type: integer
                incomes:
                  type: integer
                commitments:
                  type: integer
                additionalFundingSources:
                  type: string
                appDeviceType:
                  type: string
                appVersion:
                  type: string
                registrationStartTime:
                  type: string
                  format: date-time
                registrationExpiredTime:
                  type: string
                  format: date-time
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Couldn't update user

  /splash:
    get:
      summary: Get splash data
      tags: [User]
      parameters:
        - in: query
          name: platform
          schema:
            type: string
        - in: query
          name: appVersionName
          schema:
            type: string
        - in: query
          name: email
          schema:
            type: string
      responses:
        '200':
          description: Splash data
        '400':
          description: Couldn't get splash data

  /home:
    get:
      summary: Get home data
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: platform
          schema:
            type: string
        - in: query
          name: fullData
          schema:
            type: boolean
      responses:
        '200':
          description: Home data
        '400':
          description: Couldn't get home data

  /tourCompleted:
    patch:
      summary: Update user tour completed
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: platform
          schema:
            type: string
      responses:
        '200':
          description: User tour has completed
        '400':
          description: Couldn't update tour completed

  /{userUUID}:
    get:
      summary: Get user by UUID
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userUUID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User object
        '400':
          description: Couldn't get user

    delete:
      summary: Delete user (Admin only)
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userUUID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User removed
        '400':
          description: Couldn't remove user
        '403':
          description: Not authorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT