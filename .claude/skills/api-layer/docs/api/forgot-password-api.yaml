openapi: 3.0.3
info:
  title: Diraleashkaa Forgot Password API
  description: API for password recovery process involving code generation, validation, and password change.
  version: 1.0.0

servers:
  - url: /api/forgotPassword

components:
  securitySchemes:
    forgotPasswordAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Enter the forgotPasswordToken as 'Bearer <token>' or it will be read from the 'forgotPasswordToken' cookie.

  schemas:
    GenerateCodeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    ValidateCodeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          example: "1234"
          description: The 4-digit code sent to the user's email.

    ChangePasswordRequest:
      type: object
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          format: password
          example: "newStrongPassword123"

    AuthError:
      type: string
      example: "Not authenticated"

paths:
  /generateCode:
    post:
      tags:
        - Forgot Password
      summary: Step 1 - Generate recovery code
      description: Validates email, generates a 4-digit code, sends an email, and returns an encrypted token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCodeRequest'
      responses:
        '200':
          description: Code generated and email sent.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: forgotPasswordToken=abc123encrypted; Path=/; Secure; SameSite=None
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: The encrypted forgotPasswordToken.
        '400':
          description: Unknown user or validation error.
        '500':
          description: Server error.

  /validateCode:
    post:
      tags:
        - Forgot Password
      summary: Step 2 - Validate recovery code
      description: Verifies the code against the token. Returns an updated token with "verified" status.
      security:
        - forgotPasswordAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCodeRequest'
      responses:
        '200':
          description: Code verified successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                    example: true
                  token:
                    type: string
                    description: Updated token including verified status.
        '401':
          description: Not authenticated or expired code.
        '400':
          description: Incorrect code.

  /changePassword:
    put:
      tags:
        - Forgot Password
      summary: Step 3 - Change password
      description: Changes the user's password if the code was previously verified. Clears the recovery cookie.
      security:
        - forgotPasswordAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  passwordHasChanged:
                    type: boolean
                    example: true
        '401':
          description: Not authenticated or expired code.
        '400':
          description: Unverified code or password update failed.