openapi: 3.0.3
info:
  title: Diraleashkaa Fixed Parameter API
  description: API for retrieving system fixed parameters.
  version: 1.0.0

servers:
  - url: /api/fixedParameter

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    FixedParameter:
      type: object
      description: A system fixed parameter object stored in the database.
      additionalProperties: true
      example:
        key: inflationRate
        value: 2.5
        description: Annual inflation rate assumption
        
paths:
  /:
    get:
      tags:
        - Fixed Parameter
      summary: Get fixed parameters
      description: Returns the list of all fixed parameters. Requires authentication.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of fixed parameters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FixedParameter'
        '400':
          description: Couldn't get fixed parameters
        '401':
          description: Unauthorized
        '500':
          description: Server error

security:
  - bearerAuth: []